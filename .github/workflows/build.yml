name: Build Melly 1.1 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: melly-repo

      - name: Clone OpenOmniBot
        run: git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow -q

      - name: Full visual rebranding
        run: |
          python3 << 'PYEOF'
          import os, re, glob
          from PIL import Image, ImageDraw

          src = 'source'
          name = 'Melly 1.1'

          # 1. STRINGS.XML
          sp = os.path.join(src, 'app/src/main/res/values/strings.xml')
          if os.path.exists(sp):
            with open(sp, 'r') as f: c = f.read()
            c = re.sub(r'<string name="app_name">[^<]+</string>', f'<string name="app_name">{name}</string>', c)
            c = re.sub(r'<string name="omni_app_name">[^<]+</string>', f'<string name="omni_app_name">{name}</string>', c)
            with open(sp, 'w') as f: f.write(c)
            print('[OK] strings.xml')

          # 2. GREETING DART
          gf = os.path.join(src, 'ui/lib/features/home/pages/chat/widgets/chat_empty_greeting.dart')
          if os.path.exists(gf):
            with open(gf, 'r') as f: c = f.read()
            c = c.replace("Hi 👋, I'm Omnibot", "Hi 👋, I'm Melly 1.1")
            c = c.replace("Hi 👋, I'm OmniBot", "Hi 👋, I'm Melly 1.1")
            c = c.replace("Your AI assistant, always ready", "Your personal AI assistant")
            with open(gf, 'w') as f: f.write(c)
            print('[OK] greeting.dart')

          # 3. TODOS OS .DART — substituir strings visíveis
          dart_files = []
          for root, dirs, files in os.walk(os.path.join(src, 'ui/lib')):
            if any(s in root for s in ['.dart_tool', 'build', '.git']): continue
            for fn in files:
              if fn.endswith('.dart'): dart_files.append(os.path.join(root, fn))
          replacements = {"Omnibot": name, "OmniBot": name, "小万": name}
          for dp in dart_files:
            try:
              with open(dp, 'r', encoding='utf-8', errors='ignore') as f: c = f.read()
            except: continue
            orig = c
            for old, new in replacements.items():
              c = re.sub(rf"(['\"`]){re.escape(old)}(['\"`])", rf'\1{new}\2', c)
            if c != orig:
              with open(dp, 'w', encoding='utf-8') as f: f.write(c)
              print(f'  [DART] {os.path.relpath(dp, src)}')

          # 4. ARQUIVOS .ARB (traduções)
          for root, dirs, files in os.walk(os.path.join(src, 'ui/lib/l10n')):
            for fn in files:
              if not fn.endswith('.arb'): continue
              fp = os.path.join(root, fn)
              with open(fp, 'r', encoding='utf-8') as f: c = f.read()
              if 'Omnibot' in c or 'OmniBot' in c or '小万' in c:
                c = c.replace('Omnibot', name).replace('OmniBot', name).replace('小万', name)
                with open(fp, 'w', encoding='utf-8') as f: f.write(c)
                print(f'  [ARB] {fn}')

          # 5. ARQUIVOS .JSON
          for root, dirs, files in os.walk(os.path.join(src, 'ui')):
            for fn in files:
              if not fn.endswith('.json') or 'build' in root: continue
              fp = os.path.join(root, fn)
              with open(fp, 'r', encoding='utf-8') as f: c = f.read()
              if 'Omnibot' in c or 'OmniBot' in c:
                c = c.replace('Omnibot', name).replace('OmniBot', name)
                with open(fp, 'w', encoding='utf-8') as f: f.write(c)
                print(f'  [JSON] {fn}')

          # 6. SPLASH E ASSETS — substituir imagens do mascote
          def make_melly_icon(size):
            img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
            d = ImageDraw.Draw(img)
            m = size // 8
            d.rounded_rectangle([m, m, size-m, size-m], radius=size//4, fill=(10, 10, 26, 255))
            cx, cy = size // 2, size // 2
            sz = size // 5
            w = max(2, size // 20)
            d.line([cx-sz-w, cy-sz, cx+sz-w, cy, cx-sz-w, cy+sz], fill=(0, 229, 255, 255), width=w)
            d.line([cx-sz+w, cy-sz, cx+sz+w, cy, cx-sz+w, cy+sz], fill=(0, 229, 255, 255), width=w)
            return img

          for pat in ['**/splash*', '**/logo*.png', '**/logo*.webp', '**/omnibot*.png', '**/omnibot*.webp', '**/mascot*.png']:
            for fp in glob.glob(os.path.join(src, pat), recursive=True):
              if '.git' in fp or 'build' in fp or '.dart_tool' in fp: continue
              try:
                make_melly_icon(200).save(fp, 'PNG')
                print(f'  [IMAGE] Substituido: {os.path.relpath(fp, src)}')
              except: pass

          # 7. ÍCONE DO APP — todos os tamanhos
          for dn, s in {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}.items():
            od = os.path.join(src, 'app/src/main/res', dn)
            os.makedirs(od, exist_ok=True)
            make_melly_icon(s).save(os.path.join(od, 'ic_launcher.png'), 'PNG')
            print(f'  [ICON] {dn} ({s}x{s})')
          for sd in ['mipmap-anydpi-v26', 'drawable-anydpi-v26']:
            for fn in ['ic_launcher.xml', 'ic_launcher_round.xml']:
              p = os.path.join(src, 'app/src/main/res', sd, fn)
              if os.path.exists(p): os.remove(p)

          print('✅ Rebranding visual completo')
          PYEOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: source/ui
        run: flutter pub get

      - name: Build APK via Gradle
        working-directory: source
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDevelopStandardDebug \
            --stacktrace \
            --no-daemon \
            -Ptarget=lib/main_standard.dart

      - name: Locate and upload APK
        run: |
          echo "=== Buscando APKs em source/ ==="
          APKS=$(find source -type f -name "*.apk" 2>/dev/null)
          COUNT=$(echo "$APKS" | wc -l)
          echo "$APKS" | sort
          echo "=== Total: $COUNT APK(s) ==="
          if [ -z "$APKS" ]; then
            echo "❌ Nenhum APK gerado!"
            exit 1
          fi
          APK=$(echo "$APKS" | head -1)
          echo "📦 APK: $APK ($(ls -lh "$APK" | awk '{print $5}'))"
          echo "apk_path=$APK" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: ${{ env.apk_path }}
          if-no-files-found: error
