name: Build EQUES APKon:  push:    branches: [ main ]  workflow_dispatch:jobs:  build:    runs-on: ubuntu-latest    steps:      - uses: actions/checkout@v4        with:          path: eques-repo      - name: Clone source        run: git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source      - name: Apply EQUES name        run: |          sed -i 's|<string name="omni_app_name">[^<]*</|<string name="omni_app_name">EQUES</|' source/app/src/main/res/values/strings.xml          sed -i 's|<string name="app_name">[^<]*</|<string name="app_name">EQUES</|' source/app/src/main/res/values/strings.xml      - name: Generate icon        run: |          python3 << 'PYEOF'          import struct, zlib, os          def png(w,h,bg,fg):              cx,cy=w//2,h//2;R=min(w,h)*0.4;raw=b''              for y in range(h):                  raw+=b'\x00'                  for x in range(w):                      d=((x-cx)**2+(y-cy)**2)**0.5                      if d<=R:                          r=d/R                          raw+=struct.pack('BBBB',int(bg[0]+(fg[0]-bg[0])*r*0.3),int(bg[1]+(fg[1]-bg[1])*r*0.3),int(bg[2]+(fg[2]-bg[2])*r*0.3),255)
