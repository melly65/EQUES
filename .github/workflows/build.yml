name: Build Melly APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FLUTTER_VERSION: "3.24.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Melly Assets
        run: |
          git clone --depth 1 https://github.com/melly65/EQUES.git melly-assets

      - name: Clone OpenOmniBot
        run: |
          git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source

      - name: Detect Flutter Project
        run: |
          PUBSPEC=$(find source -name pubspec.yaml | head -1)

          if [ -z "$PUBSPEC" ]; then
            echo "pubspec.yaml not found"
            exit 1
          fi

          FLUTTER_DIR=$(dirname "$PUBSPEC")

          echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

          echo "Flutter project detected:"
          echo "$FLUTTER_DIR"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Flutter Doctor
        run: |
          flutter doctor -v

      - name: Accept Android Licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Locate Android Resources
        run: |
          RES_DIR=$(find "$FLUTTER_DIR" \
            -path "*/android/app/src/main/res" \
            | head -1)

          if [ -z "$RES_DIR" ]; then
            echo "Android resources directory not found"
            exit 1
          fi

          echo "RES_DIR=$RES_DIR" >> $GITHUB_ENV

          echo "Android resources:"
          echo "$RES_DIR"

      - name: Find Icon
        run: |
          ICON=$(find melly-assets \
            -type f \
            \( \
              -iname "icon.png" \
              -o -iname "logo.png" \
              -o -iname "*icon*.png" \
              -o -iname "*.png" \
            \) \
            | head -1)

          if [ -z "$ICON" ]; then
            echo "No icon image found"
            exit 1
          fi

          echo "Using icon:"
          echo "$ICON"

          mkdir -p prepared

          magick "$ICON" \
            -resize 1024x1024 \
            -background none \
            -gravity center \
            -extent 1024x1024 \
            prepared/icon.png

      - name: Generate Launcher Icons
        run: |
          declare -A SIZES=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for folder in "${!SIZES[@]}"
          do
            size=${SIZES[$folder]}

            mkdir -p "$RES_DIR/$folder"

            magick prepared/icon.png \
              -resize ${size}x${size} \
              "$RES_DIR/$folder/ic_launcher.png"

            cp \
              "$RES_DIR/$folder/ic_launcher.png" \
              "$RES_DIR/$folder/ic_launcher_round.png"
          done

      - name: Create Adaptive Icons
        run: |
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"
          mkdir -p "$RES_DIR/drawable"

          magick prepared/icon.png \
            -resize 432x432 \
            "$RES_DIR/drawable/ic_launcher_foreground.png"

          cat > "$RES_DIR/drawable/ic_launcher_background.xml" << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FFFFFF"/>
          </shape>
          EOF

          cat > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" << 'EOF'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cp \
            "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" \
            "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"

      - name: Apply App Name Branding
        run: |
          STRINGS=$(find "$FLUTTER_DIR" \
            -path "*/android/app/src/main/res/values/strings.xml" \
            | head -1)

          if [ -n "$STRINGS" ]; then
            sed -i \
              's#<string name="app_name">.*</string>#<string name="app_name">Melly 1.1</string>#' \
              "$STRINGS"

            echo "App name updated"
          else
            echo "strings.xml not found, skipping branding"
          fi

      - name: Get Dependencies
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          flutter pub get

      - name: Analyze Project
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          flutter analyze || true

      - name: Build APK
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          flutter build apk --debug

      - name: Verify APK
        run: |
          APK=$(find "$FLUTTER_DIR/build" \
            -name "*.apk" \
            | head -1)

          if [ -z "$APK" ]; then
            echo "APK not generated"
            exit 1
          fi

          echo "APK generated:"
          echo "$APK"

          ls -lh "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: |
            ${{ env.FLUTTER_DIR }}/build/**/*.apk
          if-no-files-found: error
