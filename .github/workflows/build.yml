name: Inspect OpenOmniBot Structure

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone OpenOmniBot
        run: |
          git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source

      - name: Show Repository Root
        run: |
          echo "===== ROOT ====="
          ls -la source

      - name: Find Flutter Projects
        run: |
          echo "===== PUBSPEC FILES ====="
          find source -name pubspec.yaml

      - name: Find Android Directories
        run: |
          echo "===== ANDROID DIRECTORIES ====="
          find source -type d -name android

      - name: Find Resource Directories
        run: |
          echo "===== RESOURCE DIRECTORIES ====="
          find source -type d -name res

      - name: Find Gradle Wrappers
        run: |
          echo "===== GRADLE WRAPPERS ====="
          find source -name gradlew

      - name: Find Android Manifests
        run: |
          echo "===== ANDROID MANIFESTS ====="
          find source -name AndroidManifest.xml

      - name: Find Strings Files
        run: |
          echo "===== STRINGS XML ====="
          find source -name strings.xml

      - name: Find Launcher Icons
        run: |
          echo "===== LAUNCHER ICONS ====="
          find source \
            \( \
              -name "ic_launcher*" \
              -o -name "*launcher*" \
              -o -name "*.png" \
            \)

      - name: Find Gradle Files
        run: |
          echo "===== GRADLE FILES ====="
          find source \
            \( \
              -name build.gradle \
              -o -name build.gradle.kts \
              -o -name settings.gradle \
              -o -name settings.gradle.kts \
            \)

      - name: Print Directory Tree
        run: |
          echo "===== DIRECTORY TREE (4 LEVELS) ====="
          find source -maxdepth 4 -type d | sort
