name: Build EQUES APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: eques-repo

      - name: Clone source
        run: git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source

      - name: Apply EQUES name
        run: |
          sed -i 's|<string name="omni_app_name">[^<]*</|<string name="omni_app_name">EQUES</|' source/app/src/main/res/values/strings.xml
          sed -i 's|<string name="app_name">[^<]*</|<string name="app_name">EQUES</|' source/app/src/main/res/values/strings.xml

      - name: Generate icon
        run: |
          python3 << 'PYEOF'
          import struct, zlib, os
          def png(w,h,bg,fg):
              cx,cy=w//2,h//2;R=min(w,h)*0.4;raw=b''
              for y in range(h):
                  raw+=b'\x00'
                  for x in range(w):
                      d=((x-cx)**2+(y-cy)**2)**0.5
                      if d<=R:
                          r=d/R
                          raw+=struct.pack('BBBB',int(bg[0]+(fg[0]-bg[0])*r*0.3),int(bg[1]+(fg[1]-bg[1])*r*0.3),int(bg[2]+(fg[2]-bg[2])*r*0.3),255)
                      else: raw+=struct.pack('BBBB',0,0,0,0)
              def c(t,d): return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
              return b'\x89PNG\r\n\x1a\n'+c(b'IHDR',struct.pack('>IIBBBBB',w,h,8,6,0,0,0))+c(b'IDAT',zlib.compress(raw))+c(b'IEND',b'')
          bg=(25,35,75);fg=(200,215,255)
          for f,s in {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}.items():
              d=f'source/app/src/main/res/{f}';os.makedirs(d,exist_ok=True);p=png(s,s,bg,fg)
              open(f'{d}/ic_launcher.png','wb').write(p);open(f'{d}/ic_launcher_round.png','wb').write(p)
          d='source/app/src/main/res/mipmap-anydpi-v26';os.makedirs(d,exist_ok=True)
          for n in['ic_launcher','ic_launcher_round']:open(f'{d}/{n}.xml','w').write(f'<?xml version="1.0"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/eques_navy"/><foreground android:drawable="@mipmap/{n}"/></adaptive-icon>')
          d='source/app/src/main/res/values';os.makedirs(d,exist_ok=True);open(f'{d}/eques_colors.xml','w').write('<?xml version="1.0"?><resources><color name="eques_navy">#FF19234B</color></resources>')
          print('Icon OK')
          PYEOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Build APK
        working-directory: source
        run: |
          cd ui
          flutter pub get
          cd ..
          ./gradlew :app:assembleDevelopStandardDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EQUES-APK
          path: source/app/build/outputs/apk/developStandard/debug/*.apk
