name: Build Melly 1.1 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: melly-repo

      - name: Clone OpenOmniBot
        run: git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow -q

      - name: Rebranding Melly 1.1
        run: |
          python3 <<'PYEOF'
          import os, re
          from PIL import Image, ImageDraw

          src="source"
          replacements = {
              "Omnibot":"Melly 1.1",
              "OmniBot":"Melly 1.1",
              "Hi 👋, I'm Omnibot":"Olá 👋, sou Melly 1.1",
              "Hi 👋, I'm OmniBot":"Olá 👋, sou Melly 1.1",
              "Your AI assistant, always ready":"Sua assistente virtual inteligente",
              "Your AI assistant":"Sua assistente virtual inteligente",
          }

          # XML e ARB: replace direto (seguro, são dados)
          for root,_,files in os.walk(src):
              for file in files:
                  if not (file.endswith(".xml") or file.endswith(".arb")): continue
                  path=os.path.join(root,file)
                  try: text=open(path,encoding="utf-8").read()
                  except: continue
                  old=text
                  for a,b in replacements.items(): text=text.replace(a,b)
                  if text!=old: open(path,"w",encoding="utf-8").write(text)

          # DART: só dentro de strings (NUNCA em nomes de classe/variável)
          for root,_,files in os.walk(src):
              if "build" in root or ".git" in root: continue
              for file in files:
                  if not file.endswith(".dart"): continue
                  path=os.path.join(root,file)
                  try: text=open(path,encoding="utf-8").read()
                  except: continue
                  old=text
                  text=re.sub(
                      r'(["\'])(.*?)(["\'])',
                      lambda m: m.group(1) +
                      m.group(2)
                      .replace("OmniBot","Melly 1.1")
                      .replace("Omnibot","Melly 1.1")
                      .replace("Your AI assistant","Sua assistente virtual inteligente")
                      + m.group(3),
                      text
                  )
                  if text!=old: open(path,"w",encoding="utf-8").write(text)

          # ÍCONE
          def icon(size):
              img=Image.new("RGBA",(size,size),(0,0,0,0))
              d=ImageDraw.Draw(img)
              w=size//8
              d.line([(size//3,size//4),(size//2,size//2),(size//3,size*3//4)], fill=(0,229,255), width=w)
              d.line([(size*2//3,size//4),(size//2,size//2),(size*2//3,size*3//4)], fill=(0,229,255), width=w)
              return img
          for folder,size in {"mipmap-mdpi":48,"mipmap-hdpi":72,"mipmap-xhdpi":96,"mipmap-xxhdpi":144,"mipmap-xxxhdpi":192}.items():
              out=f"{src}/app/src/main/res/{folder}"
              os.makedirs(out,exist_ok=True)
              icon(size).save(f"{out}/ic_launcher.png")
          for sd in ["mipmap-anydpi-v26","drawable-anydpi-v26"]:
              for fn in ["ic_launcher.xml","ic_launcher_round.xml"]:
                  p=os.path.join(src,"app/src/main/res",sd,fn)
                  if os.path.exists(p): os.remove(p)

          print("Melly rebrand OK")
          PYEOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: source/ui
        run: flutter pub get

      - name: Build APK via Gradle
        working-directory: source
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDevelopStandardDebug \
            --stacktrace \
            --no-daemon \
            -Ptarget=lib/main_standard.dart

      - name: Locate and upload APK
        run: |
          echo "=== Buscando APKs em source/ ==="
          APKS=$(find source -type f -name "*.apk" 2>/dev/null)
          COUNT=$(echo "$APKS" | wc -l)
          echo "$APKS" | sort
          echo "=== Total: $COUNT APK(s) ==="
          if [ -z "$APKS" ]; then echo "❌ Nenhum APK"; exit 1; fi
          APK=$(echo "$APKS" | head -1)
          echo "📦 APK: $APK ($(ls -lh "$APK" | awk '{print $5}'))"
          echo "apk_path=$APK" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: ${{ env.apk_path }}
          if-no-files-found: error
