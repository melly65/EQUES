name: Build Melly 1.1 APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout melly repo
        run: git clone --depth 1 https://github.com/melly65/EQUES.git melly-repo
      - name: Clone source
        run: git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source
      - name: Apply Melly 1.1 branding
        run: |
          cd source
          find . \( -name "*.kt" -o -name "*.java" -o -name "*.dart" -o -name "*.arb" -o -name "*.html" -o -name "*.json" \) | xargs grep -rl "Omnibot\|小万" 2>/dev/null | while read f; do sed -i 's/Omnibot/Melly 1.1/g; s/小万/Melly 1.1/g' "$f" 2>/dev/null || true; done
          sed -i 's|<string name="omni_app_name">[^<]*</|<string name="omni_app_name">Melly 1.1</|' app/src/main/res/values/strings.xml 2>/dev/null || true
          sed -i 's|<string name="app_name">[^<]*</|<string name="app_name">Melly 1.1</|' app/src/main/res/values/strings.xml 2>/dev/null || true
      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick
      - name: Generate icons from custom image
        run: |
          SOURCE=$(find melly-repo -name "*.png" | head -1)
          echo "Icone encontrado: $SOURCE"
          if [ -z "$SOURCE" ]; then echo "ERRO: nenhum PNG" && exit 1; fi
          for folder in mipmap-mdpi:48 mipmap-hdpi:72 mipmap-xhdpi:96 mipmap-xxhdpi:144 mipmap-xxxhdpi:192; do
            name="${folder%%:*}"; size="${folder##*:}"
            dir="source/app/src/main/res/$name"
            mkdir -p "$dir"
            convert "$SOURCE" -resize "${size}x${size}" "$dir/ic_launcher.png"
            convert "$SOURCE" -resize "${size}x${size}" "$dir/ic_launcher_round.png"
          done
          find source/app/src/main/res/mipmap-anydpi-v26 -name "ic_launcher*.xml" -delete 2>/dev/null || true
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - name: Flutter pub get
        working-directory: source/ui
        run: flutter pub get
      - name: Build APK
        working-directory: source
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDevelopStandardDebug --stacktrace --android-skip-build-dependency-validation
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: source/app/build/outputs/apk/developStandard/debug/*.apk
          if-no-files-found: error
