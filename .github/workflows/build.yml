name: Build EQUES APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: eques-repo
      - name: Clone source
        run: git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source
      - name: Apply EQUES name
        run: |
          cd source
          sed -i 's|<string name="omni_app_name">[^<]*</string>|<string name="omni_app_name">eques.ai</string>|' app/src/main/res/values/strings.xml
          sed -i 's|<string name="app_name">[^<]*</string>|<string name="app_name">eques.ai</string>|' app/src/main/res/values/strings.xml
          grep -rl "Omnibot\|OmniBot\|omnibot" ui/lib/ --include="*.dart" | while read f; do sed -i 's/Omnibot/eques.ai/g' "$f"; sed -i 's/OmniBot/eques.ai/g' "$f"; done
      - name: Generate icon
        run: |
          python3 -c "import struct,zlib,os,glob
def make_png(w,h):
 cx,cy=w//2,h//2;R=min(w,h)*0.42;raw=b''
 [raw:=raw+b'\x00'+b''.join(struct.pack('BBBB',int(20+30*(((x-cx)**2+(y-cy)**2)**0.5/R)),int(80+100*(((x-cx)**2+(y-cy)**2)**0.5/R)),int(180+60*(((x-cx)**2+(y-cy)**2)**0.5/R)),255) if ((x-cx)**2+(y-cy)**2)**0.5<=R else struct.pack('BBBB',0,0,0,0) for x in range(w)) for y in range(h)]
 def chunk(t,d):return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
 return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,6,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
sizes={'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
[os.makedirs('source/app/src/main/res/'+f,exist_ok=True) or open('source/app/src/main/res/'+f+'/ic_launcher.png','wb').write(make_png(s,s)) for f,s in sizes.items()]
[os.remove(x) for x in glob.glob('source/app/src/main/res/mipmap-anydpi-v26/*.xml')]
print('OK')"
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build APK
        working-directory: source
        run: |
          cd ui && flutter pub get && cd .. && ./gradlew :app:assembleDevelopStandardDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EQUES-APK
          path: source/app/build/outputs/apk/developStandard/debug/*.apk
