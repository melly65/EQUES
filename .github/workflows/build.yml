name: Build Melly APK

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-latest

    steps:


      - name: Checkout
        uses: actions/checkout@v4



      - name: Clone Melly assets
        run: |
          git clone --depth 1 https://github.com/melly65/EQUES.git melly-repo



      - name: Clone OpenOmniBot source
        run: |
          git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source



      - name: Apply Melly branding
        working-directory: source
        run: |

          echo "Aplicando identidade Melly..."

          find . \
          -type f \
          \( -name "*.kt" \
          -o -name "*.java" \
          -o -name "*.dart" \
          -o -name "*.xml" \
          -o -name "*.json" \
          -o -name "*.arb" \
          -o -name "*.html" \
          -o -name "*.gradle" \) \
          -print0 |
          xargs -0 sed -i \
          -e 's/OpenOmniBot/Melly 1.1/g' \
          -e 's/OpenOmni/Melly/g' \
          -e 's/OmniBot/Melly 1.1/g' \
          -e 's/Omnibot/Melly/g' \
          -e 's/omnibot/melly/g' \
          -e 's/omnimind/Melly/g' \
          -e 's/小万/Melly/g' \
          || true



          find . -name "AndroidManifest.xml" -type f -exec sed -i \
          's/android:label="[^"]*"/android:label="Melly 1.1"/g' {} \;



          find . -name "strings.xml" -type f -exec sed -i \
          's/<string name="app_name">.*<\/string>/<string name="app_name">Melly 1.1<\/string>/g' {} \;



      - name: Install ImageMagick
        run: |
          sudo apt update
          sudo apt install -y imagemagick



      - name: Prepare Melly icon
        run: |

          ICON=$(find melly-repo \
          -type f \
          \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) \
          | head -n 1)



          if [ -z "$ICON" ]; then
            echo "Nenhuma imagem encontrada"
            exit 1
          fi


          echo "Imagem usada:"
          echo "$ICON"


          mkdir -p prepared



          convert "$ICON" \
          -resize 1024x1024 \
          -gravity center \
          -background none \
          -extent 1024x1024 \
          prepared/melly_icon.png



      - name: Generate Android launcher icons
        run: |

          ICON="prepared/melly_icon.png"


          for item in \
          "mipmap-mdpi 48" \
          "mipmap-hdpi 72" \
          "mipmap-xhdpi 96" \
          "mipmap-xxhdpi 144" \
          "mipmap-xxxhdpi 192"

          do

          folder=$(echo $item | cut -d' ' -f1)
          size=$(echo $item | cut -d' ' -f2)



          mkdir -p source/app/src/main/res/$folder



          convert "$ICON" \
          -resize ${size}x${size} \
          source/app/src/main/res/$folder/ic_launcher.png



          cp source/app/src/main/res/$folder/ic_launcher.png \
          source/app/src/main/res/$folder/ic_launcher_round.png



          done



      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle



      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.0
          cache: true



      - name: Flutter pub get
        working-directory: source/ui
        run: |
          flutter pub get



      - name: Gradle permission
        working-directory: source
        run: |
          chmod +x gradlew



      - name: Build APK
        working-directory: source
        run: |

          ./gradlew clean


          ./gradlew assembleDebug \
          --stacktrace \
          --no-daemon \
          --android-skip-build-dependency-validation



      - name: Show APK files
        run: |
          find source -name "*.apk"



      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: |
            source/**/build/outputs/apk/**/*.apk
          if-no-files-found: error
