name: Build Melly 1.1 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: melly-repo

      - name: Clone OpenOmniBot
        run: git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow -q

      - name: Safe branding (visible strings only)
        run: |
          python3 << 'PYEOF'
          import os, re
          src = 'source'
          name = 'Melly 1.1'
          sp = os.path.join(src, 'app/src/main/res/values/strings.xml')
          if os.path.exists(sp):
            with open(sp, 'r') as f: c = f.read()
            c = re.sub(r'<string name="app_name">[^<]+</string>', f'<string name="app_name">{name}</string>', c)
            c = re.sub(r'<string name="omni_app_name">[^<]+</string>', f'<string name="omni_app_name">{name}</string>', c)
            with open(sp, 'w') as f: f.write(c)
          gf = os.path.join(src, 'ui/lib/features/home/pages/chat/widgets/chat_empty_greeting.dart')
          if os.path.exists(gf):
            with open(gf, 'r') as f: c = f.read()
            c = c.replace("Hi 👋, I'm Omnibot", "Hi 👋, I'm Melly 1.1")
            c = c.replace("Hi 👋, I'm OmniBot", "Hi 👋, I'm Melly 1.1")
            with open(gf, 'w') as f: f.write(c)
          for root, dirs, files in os.walk(os.path.join(src, 'ui/lib/l10n')):
            for fn in files:
              if not fn.endswith('.arb'): continue
              fp = os.path.join(root, fn)
              with open(fp, 'r', encoding='utf-8') as f: c = f.read()
              if 'Omnibot' in c or 'OmniBot' in c or '小万' in c:
                c = c.replace('Omnibot', name).replace('OmniBot', name).replace('小万', name)
                with open(fp, 'w', encoding='utf-8') as f: f.write(c)
          PYEOF

      - name: Generate icon
        run: |
          python3 << 'PYEOF'
          import os
          from PIL import Image, ImageDraw
          for dn, s in {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}.items():
            od = os.path.join('source/app/src/main/res', dn)
            os.makedirs(od, exist_ok=True)
            i = Image.new('RGBA',(s,s),(0,0,0,0))
            d = ImageDraw.Draw(i)
            m = s//8
            d.rounded_rectangle([m,m,s-m,s-m], radius=s//4, fill=(10,10,26,255))
            cx,cy,o,w = s//2,s//2,s//5,max(2,s//20)
            d.line([cx-o,cy+o//2,cx-o,cy-o//2,cx,cy+o//3,cx+o,cy-o//2,cx+o,cy+o//2], fill=(0,229,255,255), width=w)
            i.save(os.path.join(od,'ic_launcher.png'),'PNG')
          for sd in ['mipmap-anydpi-v26','drawable-anydpi-v26']:
            for fn in ['ic_launcher.xml','ic_launcher_round.xml']:
              p = os.path.join('source/app/src/main/res', sd, fn)
              if os.path.exists(p): os.remove(p)
          PYEOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: source/ui
        run: flutter pub get

      - name: Flutter analyze
        working-directory: source/ui
        continue-on-error: true
        run: flutter analyze 2>&1 | tail -50

      - name: Build APK (verbose)
        working-directory: source/ui
        run: |
          flutter build apk --debug -t lib/main_standard.dart -v 2>&1 | tail -200

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-logs
          path: |
            source/ui/.dart_tool
            source/build/reports
          if-no-files-found: ignore

      - name: Verify APK
        if: success()
        run: |
          APK="source/ui/build/app/outputs/flutter-apk/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "APK encontrado: $(ls -lh "$APK")"
          else
            echo "APK nao encontrado"
            find source -name "*.apk" -type f 2>/dev/null
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: source/ui/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
