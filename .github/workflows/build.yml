name: Build Melly 1.1 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout do seu repo (onde esse .yml vive) ───────────────────────
      - uses: actions/checkout@v4
        with:
          path: melly-repo

      # ── 2. Clone do OpenOmniBot (sem submodules — standard edition) ─────────
      - name: Clone OpenOmniBot
        run: |
          git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source
          # Confirma entrypoint que o README documenta
          ls source/ui/lib/main_standard.dart && echo "✅ main_standard.dart OK" \
            || (echo "❌ main_standard.dart não encontrado" && ls source/ui/lib/ && exit 1)

      # ── 3. Python + Pillow para o rebranding ────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow -q

      # ── 4. Rebranding completo: textos + ícone ──────────────────────────────
      - name: Rebranding Melly 1.1
        run: |
          python3 <<'PYEOF'
          import os, re
          from PIL import Image, ImageDraw

          src = "source"

          # ─── Mapeamento de substituições de texto ───────────────────────────
          # Ordem importa: mais específico primeiro para evitar double-replace
          replacements = [
              ("OpenOmniBot",                      "Melly 1.1"),
              ("OmniBot",                           "Melly 1.1"),
              ("Omnibot",                           "Melly 1.1"),
              ("Hi 👋, I'm Melly 1.1",              "Olá 👋, sou Melly 1.1"),   # evita re-replace
              ("Hi 👋, I'm OmniBot",                "Olá 👋, sou Melly 1.1"),
              ("Hi 👋, I'm Omnibot",                "Olá 👋, sou Melly 1.1"),
              ("Your AI assistant, always ready",   "Sua assistente virtual inteligente"),
              ("Your AI assistant",                 "Sua assistente virtual inteligente"),
              # applicationId e package — mantém estrutura interna de código intacta
              # NÃO substituímos "omni" em nomes de pacotes Kotlin para não quebrar imports
          ]

          # ─── XML e ARB (resources, strings, traduções) ──────────────────────
          xml_arb_changed = 0
          for root, _, files in os.walk(src):
              for file in files:
                  if not (file.endswith(".xml") or file.endswith(".arb")):
                      continue
                  path = os.path.join(root, file)
                  try:
                      text = open(path, encoding="utf-8").read()
                  except Exception:
                      continue
                  old = text
                  for a, b in replacements:
                      text = text.replace(a, b)
                  if text != old:
                      open(path, "w", encoding="utf-8").write(text)
                      xml_arb_changed += 1

          print(f"XML/ARB alterados: {xml_arb_changed}")

          # ─── Dart: substitui APENAS dentro de string literals ────────────────
          # Captura tanto aspas simples quanto duplas, sem cruzar linhas
          dart_changed = 0
          STRING_RE = re.compile(r'("""[\s\S]*?"""|\'\'\'[\s\S]*?\'\'\'|"[^"\\\n]*(?:\\.[^"\\\n]*)*"|\'[^\'\\\n]*(?:\\.[^\'\\\n]*)*\')')

          def rebrand_string_content(s):
              for a, b in replacements:
                  s = s.replace(a, b)
              return s

          for root, dirs, files in os.walk(src):
              # Pula pastas de build e git
              dirs[:] = [d for d in dirs if d not in ("build", ".git", ".gradle")]
              for file in files:
                  if not file.endswith(".dart"):
                      continue
                  path = os.path.join(root, file)
                  try:
                      text = open(path, encoding="utf-8").read()
                  except Exception:
                      continue
                  old = text

                  def replace_match(m):
                      raw = m.group(0)
                      quote = raw[0]
                      # Triplas
                      if raw.startswith('"""') or raw.startswith("'''"):
                          inner = raw[3:-3]
                          return raw[:3] + rebrand_string_content(inner) + raw[-3:]
                      # Simples
                      inner = raw[1:-1]
                      return quote + rebrand_string_content(inner) + quote

                  text = STRING_RE.sub(replace_match, text)
                  if text != old:
                      open(path, "w", encoding="utf-8").write(text)
                      dart_changed += 1

          print(f"Dart alterados: {dart_changed}")

          # ─── Ícone: setas >> estilo neon cyan ────────────────────────────────
          # Gera um ícone com duas setas chevron (>>) em neon cyan sobre fundo preto
          # Fácil de substituir depois por arte final
          def make_icon(size):
              img = Image.new("RGBA", (size, size), (0, 0, 0, 255))
              d = ImageDraw.Draw(img)
              # Stroke proporcional ao tamanho
              w = max(size // 12, 3)
              cyan = (0, 229, 255, 255)

              # Seta 1 (esquerda): chevron >
              cx1 = size * 0.30
              top = size * 0.25
              mid = size * 0.50
              bot = size * 0.75
              d.line([(cx1, top), (size * 0.50, mid), (cx1, bot)], fill=cyan, width=w)

              # Seta 2 (direita): chevron >
              cx2 = size * 0.52
              d.line([(cx2, top), (size * 0.72, mid), (cx2, bot)], fill=cyan, width=w)

              # Brilho sutil: segunda passagem com alpha reduzido para "glow"
              glow_color = (0, 229, 255, 80)
              gw = w + max(size // 20, 2)
              glow = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              gd = ImageDraw.Draw(glow)
              gd.line([(cx1, top), (size * 0.50, mid), (cx1, bot)], fill=glow_color, width=gw)
              gd.line([(cx2, top), (size * 0.72, mid), (cx2, bot)], fill=glow_color, width=gw)
              img = Image.alpha_composite(img, glow)

              return img

          icon_dirs = {
              "mipmap-mdpi":     48,
              "mipmap-hdpi":     72,
              "mipmap-xhdpi":    96,
              "mipmap-xxhdpi":   144,
              "mipmap-xxxhdpi":  192,
          }

          for folder, size in icon_dirs.items():
              out = os.path.join(src, "app/src/main/res", folder)
              os.makedirs(out, exist_ok=True)
              icon = make_icon(size)
              icon.save(os.path.join(out, "ic_launcher.png"))
              # Round também (mesmo ícone por ora)
              icon.save(os.path.join(out, "ic_launcher_round.png"))

          # Remove XMLs de adaptive icon (conflitariam com o PNG novo)
          for sd in ["mipmap-anydpi-v26", "drawable-anydpi-v26"]:
              for fn in ["ic_launcher.xml", "ic_launcher_round.xml", "ic_launcher_background.xml"]:
                  p = os.path.join(src, "app/src/main/res", sd, fn)
                  if os.path.exists(p):
                      os.remove(p)
                      print(f"Removido adaptive icon XML: {p}")

          print("✅ Rebranding Melly 1.1 concluído")
          PYEOF

      # ── 5. Java 17 ──────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 6. Flutter stable ───────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 7. Flutter pub get no módulo ui/ ─────────────────────────────────────
      - name: Flutter pub get
        working-directory: source/ui
        run: flutter pub get

      # ── 8. Diagnóstico opcional (remova após primeiro build bem-sucedido) ────
      - name: Diagnóstico de tasks Gradle
        working-directory: source
        run: |
          chmod +x gradlew
          echo "=== Tasks assemble disponíveis ==="
          ./gradlew tasks --group=build 2>/dev/null | grep -i assemble || true
          echo "=== Entrypoints Flutter ==="
          find ui/lib -name "main*.dart" | sort

      # ── 9. Build APK — standard edition (sem inferência local) ──────────────
      # Task correta conforme README oficial: :app:assembleDevelopStandardDebug
      # -Ptarget: relativo ao root do projeto, ui/ é o módulo Flutter
      - name: Build APK
        working-directory: source
        run: |
          ./gradlew :app:assembleDevelopStandardDebug \
            --stacktrace \
            --no-daemon \
            -Ptarget=ui/lib/main_standard.dart

      # ── 10. Localiza e expõe o APK gerado ───────────────────────────────────
      - name: Locate APK
        run: |
          echo "=== Buscando APKs em source/ ==="
          APKS=$(find source -type f -name "*.apk" 2>/dev/null | sort)
          if [ -z "$APKS" ]; then
            echo "❌ Nenhum APK encontrado"
            exit 1
          fi
          echo "$APKS"
          APK=$(echo "$APKS" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "📦 APK: $APK ($SIZE)"
          echo "apk_path=$APK" >> $GITHUB_ENV

      # ── 11. Upload do artifact ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: ${{ env.apk_path }}
          if-no-files-found: error
