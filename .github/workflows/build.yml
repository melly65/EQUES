name: Build Melly 1.1 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: melly-repo

      - name: Clone OpenOmniBot
        run: git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow -q

      # ══════════════════════════════════════════════════════════════
      # AUDITORIA + REBRANDING COMPLETO
      # ══════════════════════════════════════════════════════════════
      - name: Audit remaining OmniBot references
        run: |
          echo "=== AUDITORIA DE REFERENCIAS ==="
          echo ""
          echo "--- OmniBot ---"
          grep -rn "OmniBot" source/ --include="*.dart" --include="*.xml" --include="*.json" --include="*.arb" --include="*.yaml" --include="*.yml" 2>/dev/null | grep -v ".dart_tool" | grep -v "/build/" | grep -v ".git/" || echo "(nenhuma)"
          echo ""
          echo "--- Omnibot ---"
          grep -rn "Omnibot" source/ --include="*.dart" --include="*.xml" --include="*.json" --include="*.arb" --include="*.yaml" --include="*.yml" 2>/dev/null | grep -v ".dart_tool" | grep -v "/build/" | grep -v ".git/" || echo "(nenhuma)"
          echo ""
          echo "--- OpenOmniBot ---"
          grep -rn "OpenOmniBot" source/ --include="*.dart" --include="*.xml" --include="*.json" --include="*.arb" --include="*.yaml" --include="*.yml" 2>/dev/null | grep -v ".dart_tool" | grep -v "/build/" | grep -v ".git/" || echo "(nenhuma)"
          echo ""
          echo "--- Hi, I'm ---"
          grep -rn "Hi, I'm" source/ --include="*.dart" --include="*.xml" --include="*.json" --include="*.arb" 2>/dev/null | grep -v ".dart_tool" | grep -v "/build/" | grep -v ".git/" || echo "(nenhuma)"
          echo ""
          echo "--- Your AI assistant ---"
          grep -rn "Your AI assistant" source/ --include="*.dart" --include="*.xml" --include="*.json" --include="*.arb" 2>/dev/null | grep -v ".dart_tool" | grep -v "/build/" | grep -v ".git/" || echo "(nenhuma)"
          echo ""
          echo "--- Logo/asset images ---"
          find source/ -type f \( -iname "*logo*" -o -iname "*mascot*" -o -iname "*omnibot*" -o -iname "*splash*" -o -iname "*bot*" \) \( -name "*.png" -o -name "*.webp" -o -name "*.jpg" -o -name "*.svg" \) 2>/dev/null | grep -v ".dart_tool" | grep -v "/build/" | grep -v ".git/" | sort

      - name: Full visual rebranding (all files)
        run: |
          python3 << 'PYEOF'
          import os, re, glob
          from PIL import Image, ImageDraw

          src = 'source'
          name = 'Melly 1.1'

          # ─────────────────────────────────────────────────────────
          # 1. STRINGS.XML
          # ─────────────────────────────────────────────────────────
          sp = os.path.join(src, 'app/src/main/res/values/strings.xml')
          if os.path.exists(sp):
            with open(sp, 'r') as f: c = f.read()
            c = re.sub(r'<string name="app_name">[^<]+</string>', f'<string name="app_name">{name}</string>', c)
            c = re.sub(r'<string name="omni_app_name">[^<]+</string>', f'<string name="omni_app_name">{name}</string>', c)
            with open(sp, 'w') as f: f.write(c)
            print('[OK] strings.xml')

          # ─────────────────────────────────────────────────────────
          # 2. TODOS OS .dart, .xml, .json, .arb, .yaml, .yml
          #    Substituir textos visíveis entre aspas
          # ─────────────────────────────────────────────────────────
          text_extensions = ('.dart', '.xml', '.json', '.arb', '.yaml', '.yml', '.html', '.txt', '.md')
          target_files = []
          for root, dirs, files in os.walk(src):
            if any(s in root for s in ['.dart_tool', '/build/', '.git', '/.git/', 'node_modules']): continue
            for fn in files:
              if fn.endswith(text_extensions):
                target_files.append(os.path.join(root, fn))

          # Substituições de texto
          text_replacements = {
            "Omnibot": name,
            "OmniBot": name,
            "小万": name,
            "Hi 👋, I'm Omnibot": "Olá 👋, sou Melly 1.1",
            "Hi 👋, I'm OmniBot": "Olá 👋, sou Melly 1.1",
            "Hi, I'm Omnibot": "Olá, sou Melly 1.1",
            "Hi, I'm OmniBot": "Olá, sou Melly 1.1",
            "Your AI assistant, always ready": "Sua assistente virtual inteligente",
            "Your AI assistant": "Sua assistente virtual inteligente",
          }

          for fp in target_files:
            try:
              with open(fp, 'r', encoding='utf-8', errors='ignore') as f: c = f.read()
            except: continue
            orig = c
            for old, new in text_replacements.items():
              c = c.replace(old, new)
            if c != orig:
              with open(fp, 'w', encoding='utf-8') as f: f.write(c)
              print(f'  [TEXT] {os.path.relpath(fp, src)}')

          # ─────────────────────────────────────────────────────────
          # 3. GERAR ÍCONE DO APP (>> em fundo escuro)
          # ─────────────────────────────────────────────────────────
          def make_melly_icon(size):
            img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
            d = ImageDraw.Draw(img)
            m = size // 8
            d.rounded_rectangle([m, m, size-m, size-m], radius=size//4, fill=(10, 10, 26, 255))
            cx, cy = size // 2, size // 2
            sz = size // 5
            w = max(4, size // 12)
            pts = [(cx-sz-w, cy-sz), (cx+sz-w, cy), (cx-sz-w, cy+sz),
                   (cx-sz+w, cy-sz), (cx+sz+w, cy), (cx-sz+w, cy+sz)]
            d.line(pts[:3], fill=(0, 229, 255, 255), width=w)
            d.line(pts[3:], fill=(0, 229, 255, 255), width=w)
            return img

          for dn, s in {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}.items():
            od = os.path.join(src, 'app/src/main/res', dn)
            os.makedirs(od, exist_ok=True)
            make_melly_icon(s).save(os.path.join(od, 'ic_launcher.png'), 'PNG')
          print('[OK] ic_launcher.png em todos os mipmap')

          # ─────────────────────────────────────────────────────────
          # 4. SUBSTITUIR TODAS AS IMAGENS DE ASSETS
          #    Procura por qualquer PNG/WEBP/JPG/SVG em assets/
          #    e troca pelo símbolo >>
          # ─────────────────────────────────────────────────────────
          image_pats = ['**/assets/**/*.png', '**/assets/**/*.webp', '**/assets/**/*.jpg', '**/assets/**/*.jpeg',
                        '**/assets/**/*.svg', '**/res/**/splash*.png', '**/res/**/splash*.webp',
                        '**/res/**/logo*.png', '**/res/**/logo*.webp',
                        '**/res/**/mascot*.png', '**/res/**/mascot*.webp',
                        '**/res/**/omnibot*.png', '**/res/**/omnibot*.webp',
                        # drawable images
                        '**/drawable/*.png', '**/drawable/*.webp',
                        # qualquer imagem em qualquer pasta de asset
                        '**/images/*.png', '**/images/*.webp',
                        '**/images/*.jpg', '**/images/*.svg']

          replaced_images = 0
          for pat in image_pats:
            for fp in glob.glob(os.path.join(src, pat), recursive=True):
              if any(s in fp for s in ['.dart_tool', '/build/', '.git', '/.git/', 'ic_launcher']): continue
              # Pula arquivos XML
              if fp.endswith('.xml'): continue
              try:
                make_melly_icon(200).save(fp, 'PNG')
                replaced_images += 1
                print(f'  [IMG] {os.path.relpath(fp, src)}')
              except Exception as e:
                if 'cannot identify' not in str(e).lower():
                  print(f'  [WARN] {os.path.relpath(fp, src)} -> {e}')

          print(f'[OK] {replaced_images} imagens substituidas')

          # ─────────────────────────────────────────────────────────
          # 5. VERIFICAR SE AINDA RESTA "omnimind-ai" EM PUBSPEC
          # ─────────────────────────────────────────────────────────
          pubspec = os.path.join(src, 'ui/pubspec.yaml')
          if os.path.exists(pubspec):
            with open(pubspec, 'r') as f: c = f.read()
            if 'omnimind-ai' in c:
              print('[WARN] pubspec.yaml ainda referencia omnimind-ai, mas nao vamos mexer')

          print('✅ Rebranding visual completo')
          PYEOF

      # ══════════════════════════════════════════════════════════════
      # BUILD — inalterado
      # ══════════════════════════════════════════════════════════════
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: source/ui
        run: flutter pub get

      - name: Build APK via Gradle
        working-directory: source
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDevelopStandardDebug \
            --stacktrace \
            --no-daemon \
            -Ptarget=lib/main_standard.dart

      - name: Locate and upload APK
        run: |
          echo "=== Buscando APKs em source/ ==="
          APKS=$(find source -type f -name "*.apk" 2>/dev/null)
          COUNT=$(echo "$APKS" | wc -l)
          echo "$APKS" | sort
          echo "=== Total: $COUNT APK(s) ==="
          if [ -z "$APKS" ]; then echo "❌ Nenhum APK"; exit 1; fi
          APK=$(echo "$APKS" | head -1)
          echo "📦 APK: $APK ($(ls -lh "$APK" | awk '{print $5}'))"
          echo "apk_path=$APK" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: ${{ env.apk_path }}
          if-no-files-found: error

