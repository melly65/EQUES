name: Build Melly 1.1 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: melly-repo

      - name: Clone OpenOmniBot
        run: git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow -q

      - name: Rebranding (safe mode)
        run: |
          python3 << 'PYEOF'
          import os, re, glob
          from PIL import Image, ImageDraw

          src = 'source'
          name = 'Melly 1.1'

          # ── 1. STRINGS.XML ──
          sp = os.path.join(src, 'app/src/main/res/values/strings.xml')
          if os.path.exists(sp):
            with open(sp, 'r') as f: c = f.read()
            c = re.sub(r'<string name="app_name">[^<]+</string>', f'<string name="app_name">{name}</string>', c)
            c = re.sub(r'<string name="omni_app_name">[^<]+</string>', f'<string name="omni_app_name">{name}</string>', c)
            with open(sp, 'w') as f: f.write(c)

          # ── 2. ANDROIDMANIFEST.XML ──
          manif = os.path.join(src, 'app/src/main/AndroidManifest.xml')
          if os.path.exists(manif):
            with open(manif, 'r') as f: c = f.read()
            c = re.sub(r'android:label="[^"]*"', 'android:label="Melly 1.1"', c)
            with open(manif, 'w') as f: f.write(c)

          # ── 3. ARQUIVOS .dart → SOMENTE strings entre aspas ──
          dart_files = []
          for root, dirs, files in os.walk(os.path.join(src, 'ui/lib')):
            if any(s in root for s in ['.dart_tool', 'build', '.git']): continue
            for fn in files:
              if fn.endswith('.dart'): dart_files.append(os.path.join(root, fn))
          for dp in dart_files:
            try:
              with open(dp, 'r', encoding='utf-8', errors='ignore') as f: c = f.read()
            except: continue
            orig = c
            c = re.sub(r"(['\"`])Omnibot(['\"`])", r'\1Melly 1.1\2', c)
            c = re.sub(r"(['\"`])OmniBot(['\"`])", r'\1Melly 1.1\2', c)
            c = re.sub(r"(['\"`])Hi 👋, I'm Omnibot(['\"`])", r"\1Olá 👋, sou Melly 1.1\2", c)
            c = re.sub(r"(['\"`])Hi 👋, I'm OmniBot(['\"`])", r"\1Olá 👋, sou Melly 1.1\2", c)
            c = re.sub(r"(['\"`])Your AI assistant, always ready(['\"`])", r"\1Sua assistente virtual inteligente\2", c)
            c = re.sub(r"(['\"`])Your AI assistant(['\"`])", r"\1Sua assistente virtual inteligente\2", c)
            if c != orig:
              with open(dp, 'w', encoding='utf-8') as f: f.write(c)

          # ── 4. ARQUIVOS .arb ──
          for root, dirs, files in os.walk(os.path.join(src, 'ui/lib/l10n')):
            for fn in files:
              if not fn.endswith('.arb'): continue
              fp = os.path.join(root, fn)
              with open(fp, 'r', encoding='utf-8') as f: c = f.read()
              orig = c
              c = c.replace('Omnibot', name).replace('OmniBot', name).replace('小万', name)
              c = c.replace("Hi 👋, I'm Omnibot", "Olá 👋, sou Melly 1.1")
              c = c.replace("Hi 👋, I'm OmniBot", "Olá 👋, sou Melly 1.1")
              c = c.replace("Your AI assistant, always ready", "Sua assistente virtual inteligente")
              c = c.replace("Your AI assistant", "Sua assistente virtual inteligente")
              if c != orig:
                with open(fp, 'w', encoding='utf-8') as f: f.write(c)

          # ── 5. ARQUIVOS .json ──
          for root, dirs, files in os.walk(os.path.join(src, 'ui')):
            for fn in files:
              if not fn.endswith('.json') or 'build' in root: continue
              fp = os.path.join(root, fn)
              with open(fp, 'r', encoding='utf-8') as f: c = f.read()
              orig = c
              c = c.replace('Omnibot', name).replace('OmniBot', name)
              if c != orig:
                with open(fp, 'w', encoding='utf-8') as f: f.write(c)

          # ── 6. GERAR ÍCONE ──
          def make_icon(size):
            img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
            d = ImageDraw.Draw(img)
            m = size // 8
            d.rounded_rectangle([m, m, size-m, size-m], radius=size//4, fill=(10, 10, 26, 255))
            cx, cy, sz, w = size//2, size//2, size//5, max(4, size//12)
            pts = [(cx-sz-w, cy-sz), (cx+sz-w, cy), (cx-sz-w, cy+sz),
                   (cx-sz+w, cy-sz), (cx+sz+w, cy), (cx-sz+w, cy+sz)]
            d.line(pts[:3], fill=(0, 229, 255, 255), width=w)
            d.line(pts[3:], fill=(0, 229, 255, 255), width=w)
            return img
          for dn, s in {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}.items():
            od = os.path.join(src, 'app/src/main/res', dn)
            os.makedirs(od, exist_ok=True)
            make_icon(s).save(os.path.join(od, 'ic_launcher.png'), 'PNG')
          for sd in ['mipmap-anydpi-v26', 'drawable-anydpi-v26']:
            for fn in ['ic_launcher.xml', 'ic_launcher_round.xml']:
              p = os.path.join(src, 'app/src/main/res', sd, fn)
              if os.path.exists(p): os.remove(p)

          # ── 7. IMAGENS EM ASSETS ── só PNG/WEBP/JPG/SVG
          for pat in ['**/assets/**/*.png', '**/assets/**/*.webp', '**/assets/**/*.jpg',
                      '**/assets/**/*.svg', '**/drawable/*.png']:
            for fp in glob.glob(os.path.join(src, pat), recursive=True):
              if any(s in fp for s in ['.dart_tool', '/build/', '.git', 'ic_launcher']): continue
              if fp.endswith('.xml'): continue
              try: make_icon(200).save(fp, 'PNG')
              except: pass

          print('✅ Rebranding completo — codigo nao quebrado')
          PYEOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: source/ui
        run: flutter pub get

      - name: Build APK via Gradle
        working-directory: source
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDevelopStandardDebug \
            --stacktrace \
            --no-daemon \
            -Ptarget=lib/main_standard.dart

      - name: Locate and upload APK
        run: |
          echo "=== Buscando APKs em source/ ==="
          APKS=$(find source -type f -name "*.apk" 2>/dev/null)
          COUNT=$(echo "$APKS" | wc -l)
          echo "$APKS" | sort
          echo "=== Total: $COUNT APK(s) ==="
          if [ -z "$APKS" ]; then echo "❌ Nenhum APK"; exit 1; fi
          APK=$(echo "$APKS" | head -1)
          echo "📦 APK: $APK ($(ls -lh "$APK" | awk '{print $5}'))"
          echo "apk_path=$APK" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: ${{ env.apk_path }}
          if-no-files-found: error
