name: Build Melly 1.1 APK

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      app_name:
        description: Nome do app
        required: false
        default: Melly 1.1

      app_name_cn:
        description: Nome chinês
        required: false
        default: Melly 1.1


jobs:

  build:

    runs-on: ubuntu-latest


    steps:


      # =========================
      # CHECKOUT MELLY
      # =========================

      - name: Checkout Melly repo
        uses: actions/checkout@v4



      # =========================
      # CLONE OPENOMNIBOT
      # =========================

      - name: Clone OpenOmniBot
        run: |

          git config --global url."https://github.com/".insteadOf git@github.com:

          git clone \
          --depth 1 \
          https://github.com/omnimind-ai/OpenOmniBot.git \
          /tmp/omnibot


      - name: Init submodules safely
        continue-on-error: true
        run: |

          cd /tmp/omnibot

          git submodule sync

          git submodule update \
          --init \
          --recursive \
          --depth 1



      # =========================
      # ENVIRONMENT
      # =========================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"



      - name: Install Python dependencies
        run: |

          pip install --upgrade pip
          pip install Pillow



      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"



      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true



      # =========================
      # VALIDATION
      # =========================

      - name: Validate scripts
        run: |


          echo "Checking scripts..."

          ls -la scripts


          for file in \
          replace_branding.py \
          replace_package.py \
          replace_greeting.py \
          generate_icon.py \
          upgrade_api.py \
          apply_mythos_arch.py

          do

            if [ ! -f scripts/$file ]; then

              echo "Missing: scripts/$file"
              exit 1

            fi

          done



      # =========================
      # BRANDING
      # =========================


      - name: Replace branding
        run: |

          python3 scripts/replace_branding.py \
          --app-name "${{ github.event.inputs.app_name || 'Melly 1.1' }}" \
          --source /tmp/omnibot



      - name: Replace package
        run: |

          python3 scripts/replace_package.py \
          --old-package "cn.com.omnimind.bot" \
          --new-package "br.com.melly.bot" \
          --source /tmp/omnibot



      - name: Replace greeting
        run: |

          python3 scripts/replace_greeting.py \
          --english "Hi 👋, I'm Melly 1.1" \
          --chinese "你好👋，我是Melly 1.1" \
          --english-sub "I can help you" \
          --chinese-sub "我可以帮助你" \
          --source /tmp/omnibot




      # =========================
      # ICON
      # =========================

      - name: Generate icon
        run: |

          python3 scripts/generate_icon.py \
          --name "Melly 1.1" \
          --color-primary "#6C3CE0" \
          --color-accent "#00E5FF" \
          --color-bg "#0A0A1A" \
          --output-dir /tmp/omnibot/app/src/main/res




      # =========================
      # MODIFICATIONS
      # =========================

      - name: Upgrade API
        run: |

          python3 scripts/upgrade_api.py \
          --source /tmp/omnibot



      - name: Apply architecture
        run: |

          python3 scripts/apply_mythos_arch.py \
          --source /tmp/omnibot




      # =========================
      # SYNC SOURCE
      # =========================

      - name: Copy source
        run: |

          rsync -av \
          --exclude scripts \
          --exclude .github \
          /tmp/omnibot/ ./




      # =========================
      # FLUTTER
      # =========================

      - name: Flutter pub get
        run: |


          if [ -d ui ]; then

            cd ui
            flutter pub get

          else

            flutter pub get

          fi




      # =========================
      # FIND GRADLE
      # =========================

      - name: Locate Gradle
        run: |

          echo "Gradle files:"

          find . -name gradlew -type f




      # =========================
      # BUILD
      # =========================

      - name: Build APK
        run: |


          GRADLE=$(find . -name gradlew -type f | head -1)


          if [ -z "$GRADLE" ]; then

            echo "No gradle found"
            exit 1

          fi



          chmod +x $GRADLE


          DIR=$(dirname $GRADLE)


          cd $DIR


          echo "Gradle tasks:"

          ./gradlew tasks --all | grep assemble || true



          ./gradlew assembleRelease \
          --stacktrace




      # =========================
      # FIND APK
      # =========================

      - name: Find APK
        run: |

          find . -name "*.apk" -print




      # =========================
      # UPLOAD
      # =========================

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:

          name: Melly-1.1-release

          path: |
            **/*.apk
