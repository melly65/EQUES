name: Build Melly APK

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Clone Melly assets
        run: |
          git clone --depth 1 https://github.com/melly65/EQUES.git melly-repo


      - name: Clone OpenOmniBot source
        run: |
          git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source


      - name: Detect Flutter version
        working-directory: source/ui
        run: |
          grep "environment:" -A5 pubspec.yaml || true


      - name: Apply Melly branding
        working-directory: source
        run: |

          find . \
          -type f \
          \( -name "*.kt" \
          -o -name "*.java" \
          -o -name "*.dart" \
          -o -name "*.xml" \
          -o -name "*.json" \
          -o -name "*.arb" \
          -o -name "*.gradle" \) \
          -print0 |
          xargs -0 sed -i \
          -e 's/OpenOmniBot/Melly 1.1/g' \
          -e 's/OpenOmni/Melly/g' \
          -e 's/OmniBot/Melly 1.1/g' \
          -e 's/Omnibot/Melly/g' \
          -e 's/omnibot/melly/g' \
          -e 's/omnimind/Melly/g' \
          -e 's/小万/Melly/g' \
          || true



      - name: Install ImageMagick
        run: |
          sudo apt update
          sudo apt install -y imagemagick



      - name: Prepare icon
        run: |

          ICON=$(find melly-repo \
          -type f \
          \( -iname "*.png" -o -iname "*.jpg" \) \
          | head -1)


          mkdir prepared


          convert "$ICON" \
          -resize 1024x1024 \
          -gravity center \
          -background none \
          -extent 1024x1024 \
          prepared/icon.png



      - name: Generate icons
        run: |

          for item in \
          "mipmap-mdpi 48" \
          "mipmap-hdpi 72" \
          "mipmap-xhdpi 96" \
          "mipmap-xxhdpi 144" \
          "mipmap-xxxhdpi 192"

          do

          folder=$(echo $item | cut -d' ' -f1)
          size=$(echo $item | cut -d' ' -f2)

          mkdir -p source/app/src/main/res/$folder


          convert prepared/icon.png \
          -resize ${size}x${size} \
          source/app/src/main/res/$folder/ic_launcher.png


          done



      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle



      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          cache: true



      - name: Flutter dependencies
        working-directory: source/ui
        run: |
          flutter pub get



      - name: Build APK
        working-directory: source
        run: |

          chmod +x gradlew

          ./gradlew assembleDebug \
          --stacktrace \
          --no-daemon



      - name: Locate APK
        run: |
          find source -name "*.apk"



      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-debug
          path: |
            source/**/build/outputs/apk/**/*.apk
