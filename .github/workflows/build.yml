name: Build Melly 1.1 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nome do app'
        required: false
        default: 'Melly 1.1'
      app_name_cn:
        description: 'Nome chinês'
        required: false
        default: 'Melly 1.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MellyApp repo
        uses: actions/checkout@v4

      - name: Clone OpenOmniBot source
        run: |
          git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git /tmp/omnibot

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow for icon generation
        run: pip install Pillow

      # ==================== BRANDING ====================
      - name: Replace app name in strings.xml
        run: |
          python3 scripts/replace_branding.py \
            --app-name "Melly 1.1" \
            --source /tmp/omnibot

      - name: Replace package name
        run: |
          python3 scripts/replace_package.py \
            --old-package "cn.com.omnimind.bot" \
            --new-package "br.com.melly.bot" \
            --source /tmp/omnibot

      - name: Replace greeting text
        run: |
          python3 scripts/replace_greeting.py \
            --english "Hi 👋, I'm Melly 1.1" \
            --chinese "你好👋，我是Melly 1.1" \
            --english-sub "I can help you" \
            --chinese-sub "我可以帮助你" \
            --source /tmp/omnibot

      # ==================== ICON ====================
      - name: Generate app icon
        run: |
          python3 scripts/generate_icon.py \
            --name "Melly 1.1" \
            --color-primary "#6C3CE0" \
            --color-accent "#00E5FF" \
            --color-bg "#0A0A1A" \
            --output-dir /tmp/omnibot/app/src/main/res

      # ==================== API UPGRADE ====================
      - name: Apply DeepSeek V4 Pro config
        run: |
          python3 scripts/upgrade_api.py \
            --source /tmp/omnibot

      # ==================== ARCHITECTURE ====================
      - name: Apply Mythos-like architecture improvements
        run: |
          python3 scripts/apply_mythos_arch.py \
            --source /tmp/omnibot

      # ==================== BUILD ====================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Copy source to workspace
        run: |
          rsync -a /tmp/omnibot/ ./

      - name: Flutter pub get
        run: |
          cd ui
          flutter pub get

      - name: Build APK release
        run: |
          cd ui
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melly-1.1-release
          path: ui/build/app/outputs/flutter-apk/app-release.apk
