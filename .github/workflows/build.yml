name: Build EQUES APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout EQUES repo
        uses: actions/checkout@v4
        with:
          path: eques-repo
        
      - name: Clone original OpenOmniBot source
        run: |
          git clone --depth 1 https://github.com/omnimind-ai/OpenOmniBot.git source
          ls -la source/
          
      - name: Apply EQUES modifications
        run: |
          # Change app name in strings.xml
          sed -i 's|<string name="omni_app_name">[^<]*</|<string name="omni_app_name">EQUES</|' source/app/src/main/res/values/strings.xml
          sed -i 's|<string name="app_name">[^<]*</|<string name="app_name">EQUES</|' source/app/src/main/res/values/strings.xml
          
          # Add EQUES branding file
          echo "EQUES - Seu assistente pessoal on-device" > source/BRANDING.md
          
          echo "=== Modified strings.xml ==="
          grep -A1 'app_name|omni_app_name' source/app/src/main/res/values/strings.xml
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          
      - name: Build APK
        working-directory: source
        run: |
          cd ui
          flutter pub get
          cd ..
          ./gradlew :app:assembleDevelopStandardDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EQUES-APK
          path: source/app/build/outputs/apk/developStandard/debug/*.apk
